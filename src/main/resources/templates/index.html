<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm Sinh Viên</title>
    <style>
        .error { color: red; font-size: 0.9em; margin-left: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 100px; }
    </style>
</head>
<body>
<h2>Form Nhập Thông Tin Sinh Viên</h2>

<form th:action="@{/add}" th:object="${student}" method="post">
    <div class="form-group">
        <label>ID:</label>
        <input type="text" th:field="*{id}" />
        <span class="error" th:if="${#fields.hasErrors('id')}" th:errors="*{id}"></span>
    </div>

    <div class="form-group">
        <label>Name:</label>
        <input type="text" th:field="*{name}" />
        <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
    </div>

    <div class="form-group">
        <label>Date of Birth:</label>
        <input type="date" th:field="*{dob}" />
        <span class="error" th:if="${#fields.hasErrors('dob')}" th:errors="*{dob}"></span>
    </div>

    <div class="form-group">
        <label>Department:</label>
        <select th:field="*{department}">
            <option value="">-- Chọn Khoa --</option>
            <option th:each="dept : ${departments}"
                    th:value="${dept}"
                    th:text="${dept}"></option>
        </select>
        <span class="error" th:if="${#fields.hasErrors('department')}" th:errors="*{department}"></span>
    </div>

    <div>
        <button type="submit">Add</button>
        <button type="reset">Reset</button>
    </div>
</form>
</body>
</html>
